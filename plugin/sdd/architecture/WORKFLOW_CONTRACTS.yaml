# AgentSpec - Workflow Contracts
# 5-Phase Development Workflow with Agent Matching and Delegation
# Version: 3.4.0
# Date: 2026-07-15

version: "3.4.0"
name: "AgentSpec"
description: "5-phase spec-driven development workflow with agent orchestration for software and data engineering"

# =============================================================================
# WORKFLOW OVERVIEW
# =============================================================================

workflow:
  phases:
    - name: "Brainstorm"
      number: 0
      command: "/brainstorm"
      agent: "brainstorm-agent"
      skill: "sdd-brainstorm"
      purpose: "Collaborative exploration to clarify intent and approach"
      input: "Raw idea, request, or problem statement"
      output: "BRAINSTORM_{FEATURE}.md"
      optional: true

    - name: "Define"
      number: 1
      command: "/define"
      agent: "define-agent"
      skill: "sdd-define"
      purpose: "Capture and validate requirements"
      input: "Raw notes, emails, conversations, BRAINSTORM document, or direct requirements"
      output: "DEFINE_{FEATURE}.md"

    - name: "Design"
      number: 2
      command: "/design"
      agent: "design-agent"
      skill: "sdd-design"
      purpose: "Create architecture and technical specification"
      input: "DEFINE_{FEATURE}.md"
      output: "DESIGN_{FEATURE}.md"

    - name: "Build"
      number: 3
      command: "/build"
      agent: "build-agent"
      skill: "sdd-build"
      purpose: "Execute implementation with verification"
      input: "DESIGN_{FEATURE}.md"
      output: "Code files + BUILD_REPORT_{FEATURE}.md"

    - name: "Ship"
      number: 4
      command: "/ship"
      agent: "ship-agent"
      skill: "sdd-ship"
      purpose: "Archive feature with lessons learned"
      input: "All feature artifacts"
      output: "archive/{FEATURE}/SHIPPED_{DATE}.md"

  cross_phase:
    - name: "Iterate"
      command: "/iterate"
      agent: "iterate-agent"
      skill: "sdd-iterate"
      purpose: "Update any phase document when changes needed"
      works_with: ["Brainstorm", "Define", "Design"]
      phase_3_note: "To change code during Build, update DESIGN then run /build"

  # Agent model/tools live in each agent's frontmatter (authoritative, mirrored in
  # routing.json). They were previously duplicated here and in the phase blocks and
  # had drifted from the real values — state facts once, reference the owner.

  # The skills layer: each phase's methodology (process, question frameworks, gates
  # detail, anti-patterns) lives in the named sdd-* skill. Phase agents are thin
  # executors and phase commands thin entrypoints; both load the skill. This file
  # keeps only contract-grade facts: inputs, outputs, status values, quality gates.

# =============================================================================
# AGENT RESOLUTION (Local-First Precedence)
# =============================================================================
# When AgentSpec is installed as a Claude Code plugin, users may have agents
# in their project's ${CLAUDE_PLUGIN_ROOT}/agents/ directory that share a name with a plugin
# agent. This contract documents the resolution order so phase commands can
# rely on stable behavior across hosts.

agent_resolution:
  order:
    - "local"   # ${CLAUDE_PLUGIN_ROOT}/agents/<category>/<name>.md in the user's project
    - "plugin"  # ${CLAUDE_PLUGIN_ROOT}/agents/<category>/<name>.md (AgentSpec)

  behavior: |
    Local agents override plugin agents by name. When an agent name appears
    in both the user's project and the AgentSpec plugin, the local version
    is invoked. Enforcement is provided by Claude Code's native plugin
    loader; AgentSpec does not implement a parallel resolver.

  scaffolding:
    description: |
      The SessionStart hook (init-workspace.sh) creates the override
      directories on first run and writes a README documenting the pattern.
      The README is written once and preserved across runs to respect user
      customizations.
    paths:
      - "${CLAUDE_PLUGIN_ROOT}/agents/workflow/"   # SDD phase agent overrides
      - "${CLAUDE_PLUGIN_ROOT}/agents/custom/"     # New project-specific agents
    readme: "${CLAUDE_PLUGIN_ROOT}/agents/README.md"

  rules:
    - "Override agent's `name:` frontmatter field MUST match the plugin agent's name"
    - "WORKFLOW_CONTRACTS phase contracts (input/output/quality_gate) still apply to overrides"
    - "Custom agents (no plugin counterpart) are additive and do not require precedence"
    - "KB domains are NOT subject to this resolution; they are loaded only from CLAUDE_PLUGIN_ROOT"

  out_of_scope:
    - "Routing metadata in routing.json — router is build-time, not runtime"
    - "Namespaced agent invocation (e.g., local:build-agent) in command files"
    - "Per-agent precedence flags in frontmatter"

  documentation:
    user_facing: "docs/concepts/agent-overrides.md"
    quick_reference: "${CLAUDE_PLUGIN_ROOT}/agents/README.md (auto-generated in user project)"

# =============================================================================
# CONTRACT ENFORCEMENT (the Linter — ADR-002)
# =============================================================================
# A deterministic contract-validation engine. The engine is pure mechanism
# (validate an artifact against a contract -> verdict); contracts are policy
# (what is checked + severity); consumers below choose where they bind. The
# engine and verdict semantics are stable; contract CONTENT is owned upstream
# (canonical schemas pending). Operator documentation: ${CLAUDE_PLUGIN_ROOT}/tools/spec-linter/USAGE.md

contract_enforcement:
  component: "spec-linter"
  usage_doc: "${CLAUDE_PLUGIN_ROOT}/tools/spec-linter/USAGE.md"
  entry_point: "spec_linter.engine.lint(artifact, contract)"

  verdict_semantics:
    PASS: "fully compliant — proceed"
    WARN: "advisory finding — proceed, but record the finding"
    FAIL: "non-compliance — blocks; CLI exits 1"
    rule: "A contract assigns severity to its own rules; consumers MUST NOT reinterpret FAIL."

  exit_code_contract:
    description: |
      The CLI / spec-lint wrapper maps verdicts to a three-way exit code.
      ERROR is a process concern, NOT a fourth Verdict Level — the Verdict
      surface stays exactly PASS/WARN/FAIL.
    codes:
      "0": "PASS or WARN — proceed"
      "1": "FAIL — a loadable artifact violates its contract; blocks"
      "2": "ERROR — operational failure or linter unavailable (missing file, YAML syntax error, non-mapping top level, unknown phase / phase without required_sections, missing dependencies)"

  contract_sources:
    - id: "authored_as_code"
      description: "Pydantic model + governance rules (agent-spec reference contract)."
      status: "reference — canonical schema pending upstream"
    - id: "loaded_as_data"
      description: "Built from a phase's required_sections; validates a Markdown document."
    - id: "derived_from_instance"
      description: "A spec's own output_contract.required_fields become the rule for its artifact."

  available_patterns:
    pre_generation_validation: "Validate an input artifact before derivation runs (pattern name: Gate A)."
    post_generation_conformance: "Validate a produced artifact against the contract it must honor (pattern name: Gate B)."
    two_pass_loop: "validate -> regenerate on FAIL -> re-validate, bounded retries."
    ci_precommit: "Run the CLI on changed artifacts; FAIL blocks the merge."

  consumer_bindings:
    note: |
      The bindings below are where a phase's binding is DECLARED — this file is
      the single source for which phase binds on what. The procedure that runs
      the binding lives in that phase's skill (sdd-define, sdd-design,
      sdd-iterate), per the component model: agents execute, skills teach how.
      Currently wired: the Define and Design phases run a pre-handoff validation
      of the produced phase document against its phase contract
      (required_sections) via the spec-lint wrapper, branching on the exit code
      (0 proceed, 1 block, 2 record a VISIBLE skip and proceed — never assume
      PASS on exit 2). Phases without required_sections (Brainstorm, Build, Ship)
      have no phase contract yet, so the document-level check is N/A for them
      today. Specified TARGET: a two-pass
      spec -> validate -> document -> validate binding (the Gate A
      pattern) activates when upstream phase-spec schemas land.
    bindings:
      - phase: "Define"
        artifact: "DEFINE_{FEATURE}.md"
        contract_source: "loaded_as_data"
        binds_on: "required_sections"
        pattern: "post_generation_conformance"
        status: "wired (document-level); two-pass is the target"
      - phase: "Design"
        artifact: "DESIGN_{FEATURE}.md"
        contract_source: "loaded_as_data"
        binds_on: "required_sections"
        pattern: "post_generation_conformance"
        status: "wired (document-level); two-pass is the target"
      - phase: "Build"
        artifact: "BUILD_REPORT_{FEATURE}.md"
        contract_source: "loaded_as_data"
        binds_on: "required_sections"
        pattern: "post_generation_conformance"
        status: "specified target"
      - phase: "Brainstorm"
        artifact: "BRAINSTORM_{FEATURE}.md"
        contract_source: "loaded_as_data"
        binds_on: "required_sections"
        pattern: "post_generation_conformance"
        status: "specified target"
      - phase: "Ship"
        artifact: "SHIPPED_{DATE}.md"
        contract_source: "loaded_as_data"
        binds_on: "required_sections"
        pattern: "post_generation_conformance"
        status: "specified target"
      - phase: "Iterate"
        artifact: "the edited phase document"
        contract_source: "loaded_as_data"
        binds_on: "required_sections of the edited document's phase"
        pattern: "post_generation_conformance"
        status: "specified target"

# =============================================================================
# PHASE 0: BRAINSTORM (Optional)
# =============================================================================

brainstorm:
  command:
    name: "/brainstorm"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/brainstorm.md"
    args: "<idea-or-request>"
    examples:
      - '/brainstorm "Build a user notification system"'
      - '/brainstorm notes/rough-idea.txt'
      - '/brainstorm "I want to add data export functionality"'

  agent:
    name: "brainstorm-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/brainstorm-agent.md"

  skill:
    name: "sdd-brainstorm"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-brainstorm/SKILL.md"
    owns: "Phase methodology — process steps, questioning principles, approach comparison, YAGNI, incremental validation, sample collection, anti-patterns"

  input:
    types:
      - raw_idea
      - problem_statement
      - feature_request
      - rough_notes
      - comparison_request

  output:
    file: ".claude/sdd/features/BRAINSTORM_{FEATURE}.md"
    template: "${CLAUDE_PLUGIN_ROOT}/sdd/templates/BRAINSTORM_TEMPLATE.md"
    status_values:
      - "Exploring"
      - "Approaches Identified"
      - "Ready for Define"

  quality_gate:
    minimum_questions: 3
    sample_collection_asked: true
    minimum_approaches: 2
    minimum_validations: 2
    user_confirmed_approach: true
    yagni_applied: true
    draft_requirements_included: true

# =============================================================================
# PHASE 1: DEFINE
# =============================================================================

define:
  command:
    name: "/define"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/define.md"
    args: "<input>"
    examples:
      - "/define notes/meeting-notes.md"
      - "/define \"Build a REST API for user management\""
      - "/define docs/stakeholder-email.txt"

  agent:
    name: "define-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/define-agent.md"

  skill:
    name: "sdd-define"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-define/SKILL.md"
    owns: "Phase methodology — input classification, entity extraction patterns, clarity scoring procedure, gap-filling questions, anti-patterns"

  input:
    types:
      - brainstorm_document
      - meeting_notes
      - email_thread
      - conversation
      - direct_requirement
      - mixed_sources

  output:
    file: ".claude/sdd/features/DEFINE_{FEATURE}.md"
    template: "${CLAUDE_PLUGIN_ROOT}/sdd/templates/DEFINE_TEMPLATE.md"
    status_values:
      - "Draft"
      - "In Progress"
      - "Needs Clarification"
      - "Ready for Design"

  quality_gate:
    clarity_score:
      minimum: 12
      maximum: 15
      breakdown:
        problem: 3
        users: 3
        goals: 3
        success: 3
        scope: 3

  required_sections:
    - metadata
    - problem_statement
    - target_users
    - goals  # With MUST/SHOULD/COULD priority
    - success_criteria
    - acceptance_tests
    - out_of_scope
    - constraints
    - assumptions  # New: trackable risk register
    - clarity_score_breakdown
    - open_questions
    - revision_history


# =============================================================================
# PHASE 2: DESIGN
# =============================================================================

design:
  command:
    name: "/design"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/design.md"
    args: "<define-file>"
    examples:
      - "/design .claude/sdd/features/DEFINE_USER_NOTIFICATIONS.md"
      - "/design DEFINE_USER_AUTH.md"
      - "/design .claude/sdd/features/DEFINE_DATA_EXPORT.md"

  agent:
    name: "design-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/design-agent.md"

  skill:
    name: "sdd-design"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-design/SKILL.md"
    owns: "Phase methodology — architecture design process, inline decision records, file manifest construction, code patterns, testing strategy, anti-patterns"

  input:
    file: ".claude/sdd/features/DEFINE_{FEATURE}.md"
    required_sections:
      - problem_statement
      - success_criteria
      - acceptance_tests

  output:
    file: ".claude/sdd/features/DESIGN_{FEATURE}.md"
    template: "${CLAUDE_PLUGIN_ROOT}/sdd/templates/DESIGN_TEMPLATE.md"

  required_sections:
    - architecture_overview
    - components
    - key_decisions
    - file_manifest
    - code_patterns
    - testing_strategy

# =============================================================================
# PHASE 3: BUILD
# =============================================================================

build:
  command:
    name: "/build"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/build.md"
    args: "<design-file>"
    examples:
      - "/build .claude/sdd/features/DESIGN_USER_NOTIFICATIONS.md"

  agent:
    name: "build-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/build-agent.md"

  skill:
    name: "sdd-build"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-build/SKILL.md"
    owns: "Phase methodology — task extraction, delegation flow and protocol, verification procedures, data-engineering delegation map, error handling, build-report mechanics, anti-patterns"

  input:
    files:
      - ".claude/sdd/features/DESIGN_{FEATURE}.md"
      - ".claude/sdd/features/DEFINE_{FEATURE}.md"

  output:
    code: "As specified in DESIGN file manifest"
    report: ".claude/sdd/reports/BUILD_REPORT_{FEATURE}.md"
    template: "${CLAUDE_PLUGIN_ROOT}/sdd/templates/BUILD_REPORT_TEMPLATE.md"

  execution:
    task_generation: "on-the-fly from file manifest"
    order: "by dependencies"
    verification: "after each file"
    retry_limit: 3


# =============================================================================
# PHASE 4: SHIP
# =============================================================================

ship:
  command:
    name: "/ship"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/ship.md"
    args: "<define-file>"
    examples:
      - "/ship .claude/sdd/features/DEFINE_USER_NOTIFICATIONS.md"

  agent:
    name: "ship-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/ship-agent.md"

  skill:
    name: "sdd-ship"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-ship/SKILL.md"
    owns: "Phase methodology — completion verification, archive procedure, lessons-learned extraction, anti-patterns"

  input:
    required:
      - ".claude/sdd/features/DEFINE_{FEATURE}.md"
      - ".claude/sdd/features/DESIGN_{FEATURE}.md"
      - ".claude/sdd/reports/BUILD_REPORT_{FEATURE}.md"

  output:
    archive_folder: ".claude/sdd/archive/{FEATURE}/"
    shipped_file: "SHIPPED_{DATE}.md"
    template: "${CLAUDE_PLUGIN_ROOT}/sdd/templates/SHIPPED_TEMPLATE.md"

  archive_contents:
    - "BRAINSTORM_{FEATURE}.md"  # Optional - if Phase 0 was used
    - "DEFINE_{FEATURE}.md"
    - "DESIGN_{FEATURE}.md"
    - "BUILD_REPORT_{FEATURE}.md"
    - "SHIPPED_{DATE}.md"

  pre_ship_checklist:
    - build_report_complete
    - all_tests_passing
    - no_blocking_issues
    - acceptance_tests_verified

# =============================================================================
# CROSS-PHASE: ITERATE
# =============================================================================

iterate:
  command:
    name: "/iterate"
    file: "${CLAUDE_PLUGIN_ROOT}/commands/workflow/iterate.md"
    args: '<file> "<change-description>"'
    examples:
      - '/iterate DEFINE_DATA_EXPORT.md "Add support for CSV format"'
      - '/iterate DESIGN_AUTH.md "Change from JWT to session-based"'
      - '/iterate .claude/sdd/features/DEFINE_AUTH.md "Add multi-language support"'

  agent:
    name: "iterate-agent"
    file: "${CLAUDE_PLUGIN_ROOT}/agents/workflow/iterate-agent.md"

  skill:
    name: "sdd-iterate"
    file: "${CLAUDE_PLUGIN_ROOT}/skills/sdd-iterate/SKILL.md"
    owns: "Phase methodology — change classification, cascade analysis and rules, user confirmation flow, version tracking, anti-patterns"

  works_with:
    - phase: "Brainstorm"
      file_pattern: "BRAINSTORM_*.md"
      cascade_to: "Define"
    - phase: "Define"
      file_pattern: "DEFINE_*.md"
      cascade_to: "Design"
    - phase: "Design"
      file_pattern: "DESIGN_*.md"
      cascade_to: "Code"

  thresholds:
    use_iterate: "< 30% change"
    consider_new_define: "> 50% change"
    indicators_for_new_define:
      - "Different problem entirely"
      - "Different target users"
      - "Fundamental approach change"

# =============================================================================
# FOLDER STRUCTURE
# =============================================================================

folder_structure:
  root: ".claude/sdd/"

  directories:
    features:
      path: "features/"
      contains:
        - "BRAINSTORM_*.md"
        - "DEFINE_*.md"
        - "DESIGN_*.md"

    reports:
      path: "reports/"
      contains:
        - "BUILD_REPORT_*.md"

    archive:
      path: "archive/"
      structure: "{FEATURE_NAME}/"
      contains:
        - "DEFINE_*.md"
        - "DESIGN_*.md"
        - "BUILD_REPORT_*.md"
        - "SHIPPED_*.md"

    templates:
      path: "templates/"
      contains:
        - "BRAINSTORM_TEMPLATE.md"
        - "DEFINE_TEMPLATE.md"
        - "DESIGN_TEMPLATE.md"
        - "BUILD_REPORT_TEMPLATE.md"
        - "SHIPPED_TEMPLATE.md"

    architecture:
      path: "architecture/"
      contains:
        - "WORKFLOW_CONTRACTS.yaml"
        - "ARCHITECTURE.md"

# =============================================================================
# NAMING CONVENTIONS
# =============================================================================

naming:
  feature_name:
    format: "SCREAMING_SNAKE_CASE"
    examples:
      - "USER_NOTIFICATIONS"
      - "USER_AUTHENTICATION"
      - "DATA_EXPORT"

  files:
    brainstorm: "BRAINSTORM_{FEATURE}.md"
    define: "DEFINE_{FEATURE}.md"
    design: "DESIGN_{FEATURE}.md"
    build_report: "BUILD_REPORT_{FEATURE}.md"
    shipped: "SHIPPED_{YYYY-MM-DD}.md"

  date_format: "YYYY-MM-DD"

# =============================================================================
# STATUS TRANSITIONS (CRITICAL: Prevents stale document statuses)
# =============================================================================

status_transitions:
  description: |
    Each phase MUST update document statuses when completing.
    This prevents stale "Ready for X" statuses after phase completion.

  brainstorm:
    initial: "Exploring"
    in_progress: "Approaches Identified"
    ready: "Ready for Define"
    after_define: "✅ Complete (Defined)"

  define:
    initial: "Draft"
    in_progress: "In Progress"
    needs_work: "Needs Clarification"
    ready: "Ready for Design"
    after_design: "✅ Complete (Designed)"
    after_build: "✅ Complete (Built)"
    after_ship: "✅ Shipped"

  design:
    initial: "Draft"
    in_progress: "In Progress"
    ready: "Ready for Build"
    after_build: "✅ Complete (Built)"
    after_ship: "✅ Shipped"

  build_report:
    initial: "In Progress"
    complete: "✅ Complete"
    after_ship: "✅ Shipped"

  update_rules:
    - trigger: "/define completes (with brainstorm input)"
      updates:
        - file: "BRAINSTORM_{FEATURE}.md"
          field: "Status"
          value: "✅ Complete (Defined)"

    - trigger: "/design completes"
      updates:
        - file: "DEFINE_{FEATURE}.md"
          field: "Status"
          value: "✅ Complete (Designed)"
        - file: "DEFINE_{FEATURE}.md"
          field: "Next Step"
          value: "/build"

    - trigger: "/build completes"
      updates:
        - file: "DEFINE_{FEATURE}.md"
          field: "Status"
          value: "✅ Complete (Built)"
        - file: "DESIGN_{FEATURE}.md"
          field: "Status"
          value: "✅ Complete (Built)"
        - file: "DEFINE_{FEATURE}.md"
          field: "Next Step"
          value: "/ship"
        - file: "DESIGN_{FEATURE}.md"
          field: "Next Step"
          value: "/ship"

    - trigger: "/ship completes"
      updates:
        - file: "DEFINE_{FEATURE}.md"
          field: "Status"
          value: "✅ Shipped"
        - file: "DESIGN_{FEATURE}.md"
          field: "Status"
          value: "✅ Shipped"
        - file: "BUILD_REPORT_{FEATURE}.md"
          field: "Status"
          value: "✅ Shipped"

  agent_responsibility:
    - "Each agent MUST update upstream document statuses before completing"
    - "design-agent: Update DEFINE status to 'Complete (Designed)'"
    - "build-agent: Update DEFINE and DESIGN status to 'Complete (Built)'"
    - "ship-agent: Update all documents to 'Shipped'"

# =============================================================================
# QUALITY STANDARDS
# =============================================================================

quality:
  code:
    - no_inline_comments
    - type_hints_required
    - self_documenting_names
    - config_in_yaml_not_code
    - self_contained_units

  documentation:
    - clear_headings
    - tables_for_structured_data
    - ascii_diagrams_for_architecture
    - version_history_maintained

  data_engineering_quality_gate:
    sql_lint: "sqlfluff lint passes (0 violations)"
    dbt_tests: "All unique + not_null on PKs, relationships on FKs"
    data_freshness: "Source freshness within SLA"
    schema_contract: "No breaking changes without deprecation"
    pii_check: "All PII columns tagged and masked in non-prod"

  data_anti_patterns:
    - select_star: "SELECT * in production models — expand to explicit columns"
    - implicit_coercion: "Implicit type coercion in joins — cast explicitly"
    - missing_partition_filter: "Query without partition filter on large table — always filter"
    - hardcoded_dates: "Hardcoded dates in SQL — use parameters or macros"
    - no_incremental_strategy: "Full refresh on large tables — use incremental where possible"

  process:
    - phase_gates_enforced
    - all_artifacts_linked
    - changes_via_iterate
    - lessons_captured

# =============================================================================
# VERSION HISTORY
# =============================================================================

version_history:
  - version: "3.4.0"
    date: "2026-07-15"
    changes:
      - "Skills layer: each SDD phase's methodology now lives in a per-phase skill (sdd-brainstorm, sdd-define, sdd-design, sdd-build, sdd-ship, sdd-iterate); phase agents are thin executors and phase commands thin entrypoints — both load the skill"
      - "Phase blocks now carry a skill: reference and keep only contract-grade facts (inputs, outputs, status values, quality gates, thresholds); methodology sub-blocks (process, questioning, extraction_elements, inline_decisions, cascade_rules, anti_patterns, etc.) moved into the skills"
      - "Removed duplicated agent model/tools from the workflow overview and phase blocks — agent frontmatter is authoritative (mirrored in routing.json); the duplicated copies had drifted from the real values"
      - "Grounded in the component model (kb/shared/component-model.md): agents execute, skills teach how, commands are entrypoints, KBs are source-of-truth"
      - "Contract-gate procedure relocated from the phase agents into the phase skills (sdd-define, sdd-design, sdd-iterate) under the same component-model split; the skills name the artifact and phase to validate and point at the linter's USAGE, while the exit-code contract and verdict semantics stay owned by contract_enforcement here and by ${CLAUDE_PLUGIN_ROOT}/tools/spec-linter/USAGE.md — consumers do not restate them"
      - "Dropped the Brainstorm/Build/Ship gate stubs that narrated a missing required_sections key: the phase blocks here already own that fact and the linter reports the case itself (exit 2 — record a visible skip and proceed)"

  - version: "3.3.1"
    date: "2026-06-19"
    changes:
      - "Recorded the spec-linter exit-code contract under contract_enforcement (0 = PASS/WARN, 1 = FAIL, 2 = ERROR/unavailable); ERROR is a process concern, not a fourth Verdict Level"
      - "Consumer bindings now run for real via the spec-lint wrapper and degrade loudly on exit 2 (a VISIBLE skip note, never an assumed PASS); clarified that only Define and Design have phase contracts (required_sections) today, so the document check is N/A for Brainstorm/Build/Ship"

  - version: "3.3.0"
    date: "2026-06-10"
    changes:
      - "Added contract_enforcement contract documenting the spec-linter engine (ADR-002): verdict semantics, three contract sources, available usage patterns, and per-phase consumer bindings"
